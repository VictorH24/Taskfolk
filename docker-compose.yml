services:
  taskfolk:
    build: .
    container_name: Taskfolk
    restart: unless-stopped
    # user: "${UID:-1000}:${GID:-1000}"
    ports:
      - 127.0.0.1:3000:3000
    environment:
      PORT: 3000
      SHARED_DIR: /shared
      CONFIG_DIR: /config
      MAX_UPLOAD_MB: 100
      MAX_TEXT_PREVIEW_BYTES: 524288
      OPENCLAW_SESSIONS_DIR: /openclaw-agents
      GATEWAY_AUTH_TOKEN: ${GATEWAY_AUTH_TOKEN:-}
      GATEWAY_AUTH_PASSWORD: ${GATEWAY_AUTH_PASSWORD:-}
      GATEWAY_AUTH_SECURE_COOKIE: ${GATEWAY_AUTH_SECURE_COOKIE:-false}
      CUSTOM_AVATAR_VARIANTS_DIR: ${CUSTOM_AVATAR_VARIANTS_DIR:-}
    volumes:
      # config folder stored locally for persistence, you can change ./config to the host folder you want to use.
      - ./config:/config
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
