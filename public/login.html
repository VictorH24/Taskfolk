<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claw OS Login</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="loginPage">
  <main class="loginShell">
    <section class="loginPanel" aria-labelledby="loginTitle">
      <span class="eyebrow">Gateway access</span>
      <h1 id="loginTitle">Claw OS</h1>
      <p id="loginMessage">Enter the configured gateway token to continue.</p>
      <form id="gatewayLoginForm" class="loginForm">
        <label>
          <span>Token</span>
          <input id="gatewayToken" name="token" type="password" autocomplete="current-password" required />
        </label>
        <label id="gatewayPasswordRow" class="hidden">
          <span>Password</span>
          <input id="gatewayPassword" name="password" type="password" autocomplete="current-password" />
        </label>
        <button type="submit">Log in</button>
      </form>
      <p id="loginError" class="loginError" role="alert"></p>
    </section>
  </main>
  <script src="/login.js"></script>
</body>
</html>
